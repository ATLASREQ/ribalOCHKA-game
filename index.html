<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>🎣 Гранд Рыбалка: Трофейная Охота</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #0077ff; --bg: #e0f2ff; --panel: #ffffff; --text: #2c3e50; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); background-image: linear-gradient(180deg, #6ec6ff 0%, #e0f2ff 100%); margin: 0; padding: 20px; color: var(--text); min-height: 100vh; text-align: center; }
        .container { max-width: 500px; margin: 0 auto; }
        .panel { background: var(--panel); padding: 20px; margin-bottom: 20px; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.08); border: 1px solid rgba(255,255,255,0.3); position: relative; }
        #rod-animation { font-size: 50px; height: 60px; display: none; margin: 10px 0; }
        .fishing-active #rod-animation { display: block; animation: cast 1s infinite ease-in-out; }
        @keyframes cast { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        #trophy-display { min-height: 150px; display: flex; align-items: center; justify-content: center; margin: 10px 0; border: 2px dashed #ddd; border-radius: 15px; background: #f9f9f9; overflow: hidden; }
        #trophy-img { max-width: 140px; max-height: 140px; display: none; animation: popIn 0.5s ease-out; border-radius: 10px; object-fit: cover; }
        #trophy-placeholder { font-size: 50px; color: #ccc; }
        @keyframes popIn { 0% { transform: scale(0); opacity: 0; } 80% { transform: scale(1.1); opacity: 1; } 100% { transform: scale(1); } }
        input { padding: 12px; font-size: 16px; border-radius: 10px; border: 2px solid #ddd; width: 70%; margin-bottom: 10px; outline: none;}
        button { font-size: 18px; padding: 12px 25px; cursor: pointer; border-radius: 12px; border: none; background: var(--primary); color: white; font-weight: bold; box-shadow: 0 4px 0 #0056b3; transition: all 0.1s; }
        button:active { transform: translateY(2px); box-shadow: 0 2px 0 #0056b3; }
        button:disabled { background: #adb5bd; box-shadow: 0 4px 0 #6c757d; cursor: not-allowed; }
        #result { font-size: 20px; font-weight: bold; margin: 10px 0; min-height: 25px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-weight: bold; font-size: 18px; }
        #inventory, #leaderboard, #chat-box { text-align: left; line-height: 1.6; }
        .inv-item { display: flex; align-items: center; margin-bottom: 5px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .inv-icon { width: 35px; height: 35px; margin-right: 12px; object-fit: cover; border-radius: 5px; background: #eee; }
        .weight-tag { background: #eee; padding: 2px 6px; border-radius: 5px; font-size: 12px; margin-left: auto; }
        
        /* Стили чата */
        #chat-box { height: 150px; overflow-y: auto; background: #f1f8ff; padding: 10px; border-radius: 10px; font-size: 14px; margin-bottom: 10px; border: 1px solid #d0e7ff; }
        .chat-msg { margin-bottom: 4px; border-bottom: 1px solid #e0e0e0; padding-bottom: 2px; }
        .chat-msg b { color: var(--primary); }
    </style>
</head>
<body>
<div class="container">
    <h1>🎣 Гранд Рыбалка</h1>
    <div class="panel">
        <input type="text" id="nickname" placeholder="Твой ник...">
        <button onclick="saveNick()">💾</button>
    </div>
    <div class="panel" id="main-game">
        <div id="rod-animation">🎣</div>
        <div id="trophy-display">
            <span id="trophy-placeholder">?</span>
            <img id="trophy-img" src="" alt="Трофей">
        </div>
        <div id="result">Закидывай удочку!</div>
        <button id="fishBtn">ЗАБРОСИТЬ</button>
        <div id="timer" style="color: #e74c3c; margin-top:10px; font-weight:bold;"></div>
    </div>
    
    <div class="panel">
        <h3>💬 Чат рыбаков</h3>
        <div id="chat-box">Загрузка сообщений...</div>
        <div style="display:flex; gap:5px;">
            <input type="text" id="chatInput" style="flex:1; margin-bottom:0;" placeholder="Сообщение...">
            <button onclick="sendMsg()" style="padding: 10px 15px;">➡️</button>
        </div>
    </div>

    <div class="panel">
        <div class="stats-grid">
            <div>⚖️ Вес: <span id="stat-weight">0</span> кг</div>
            <div>🐟 Рыб: <span id="stat-count">0</span></div>
        </div>
    </div>
    <div class="panel"><h3>🎒 Твой инвентарь</h3><div id="inventory">Пусто</div></div>
    <div class="panel"><h3>🏆 Топ по массе (кг)</h3><div id="leaderboard">Загрузка...</div></div>
</div>

<script>
    const supabaseUrl = "https://fzsmyifqmsbdkrhchrgs.supabase.co";
    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ6c215aWZxbXNiZGtyaGNocmdzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NjQ0MjAsImV4cCI6MjA5MDA0MDQyMH0.uWwvjhQL_yEaaCCUnYIYSVHj-bNdbEJ-yPACrbeJGP4";
    const db = window.supabase.createClient(supabaseUrl, supabaseKey);

    // Звук всплеска
    const splashSound = new Audio('https://www.soundjay.com/nature/sounds/splash-8.mp3');

    const fishes = [
        { name: "Карась", rarity: "common", chance: 30, minW: 0.2, maxW: 1.5, image: "https://i.ytimg.com/vi/Vy8rRsfMbYY/maxresdefault.jpg" },
        { name: "Окунь", rarity: "common", chance: 25, minW: 0.3, maxW: 2.5, image: "https://i.ytimg.com/vi/N55g_NvEu9c/maxresdefault.jpg" },
        { name: "Сом", rarity: "rare", chance: 10, minW: 5.0, maxW: 50.0, image: "https://avatars.mds.yandex.net/i?id=f25c27a2e5c2428546dbeb9d5642cc59c897acb0-5233251-images-thumbs&n=13" },
        { name: "Золотая рыбка", rarity: "rare", chance: 5, minW: 0.1, maxW: 0.5, image: "https://avatars.mds.yandex.net/i?id=6f716f0df1f0e64f128187c743e49ef3_l-6516498-images-thumbs&n=13" },
        { name: "Кракен", rarity: "legend", chance: 1, minW: 500.0, maxW: 2500.0, image: "https://avatars.mds.yandex.net/i?id=dd13a6e98bdf167c5b86c86dc71fea0da385b381-5888173-images-thumbs&n=13" }
    ];

    let nickname = localStorage.getItem("nick") || "";
    document.getElementById("nickname").value = nickname;

    const trophyImg = document.getElementById("trophy-img");
    const trophyPlaceholder = document.getElementById("trophy-placeholder");
    const fishBtn = document.getElementById("fishBtn");

    let stats, inventory;
    try {
        stats = JSON.parse(localStorage.getItem("stats")) || { caught: 0, totalWeight: 0 };
        inventory = JSON.parse(localStorage.getItem("inventory")) || {};
    } catch(e) {
        stats = { caught: 0, totalWeight: 0 }; inventory = {};
    }

    function saveNick() {
        nickname = document.getElementById("nickname").value.trim();
        if(!nickname) return alert("Введи имя!");
        localStorage.setItem("nick", nickname);
        alert("Ник сохранен!");
        savePlayer();
    }

    async function savePlayer() {
        if (!nickname) return;
        try {
            await db.from("players").upsert({ nickname: nickname, fish: Number(stats.totalWeight.toFixed(1)) }, { onConflict: 'nickname' });
        } catch (e) { console.error(e); }
    }

    // Функция отправки сообщения
    async function sendMsg() {
        const input = document.getElementById("chatInput");
        const txt = input.value.trim();
        if(!nickname) return alert("Сначала сохрани ник!");
        if(!txt) return;

        try {
            await db.from("messages").insert([{ nickname: nickname, text: txt }]);
            input.value = "";
            loadData();
        } catch (e) { console.error("Ошибка чата:", e); }
    }

    async function loadData() {
        try {
            // Загрузка ТОПа
            const { data: top } = await db.from("players").select("*").order("fish", { ascending: false }).limit(10);
            if (top) {
                document.getElementById("leaderboard").innerHTML = top.map((p, i) => `<b>${i + 1}.</b> ${p.nickname} — ⚖️ <b>${p.fish || 0} кг</b>`).join("<br>");
            }
            // Загрузка сообщений
            const { data: msgs } = await db.from("messages").select("*").order("id", { ascending: false }).limit(15);
            if (msgs) {
                document.getElementById("chat-box").innerHTML = msgs.map(m => `<div class="chat-msg"><b>${m.nickname}:</b> ${m.text}</div>`).join("");
            }
        } catch (e) { console.error(e); }
    }

    function updateUI() {
        let invHtml = "";
        for (let fName in inventory) {
            let f = fishes.find(x => x.name === fName);
            if (f) invHtml += `<div class="inv-item"><img src="${f.image}" class="inv-icon"><b>${fName}</b>: ${inventory[fName].count} шт. <span class="weight-tag">${inventory[fName].weight.toFixed(1)} кг</span></div>`;
        }
        document.getElementById("inventory").innerHTML = invHtml || "Пусто";
        document.getElementById("stat-weight").innerText = stats.totalWeight.toFixed(1);
        document.getElementById("stat-count").innerText = stats.caught;
    }

    fishBtn.onclick = async function() {
        if (!nickname) return alert("Введи ник!");
        
        // Звук заброса
        splashSound.play().catch(() => {});

        trophyImg.style.display = "none";
        trophyPlaceholder.style.display = "block";
        document.getElementById("main-game").classList.add("fishing-active");
        fishBtn.disabled = true;
        document.getElementById("result").innerText = "Закидываем...";

        setTimeout(async () => {
            document.getElementById("main-game").classList.remove("fishing-active");
            if (Math.random() < 0.7) {
                let roll = Math.random() * 71, sum = 0, f = fishes[0];
                for (let x of fishes) { sum += x.chance; if (roll < sum) { f = x; break; } }
                let w = Math.random() * (f.maxW - f.minW) + f.minW;
                
                if(!inventory[f.name]) inventory[f.name] = { count: 0, weight: 0 };
                inventory[f.name].count++; 
                inventory[f.name].weight += w;
                stats.caught++; 
                stats.totalWeight += w;

                trophyImg.src = f.image;
                trophyImg.style.display = "block";
                trophyPlaceholder.style.display = "none";
                document.getElementById("result").innerHTML = `Поймал: ${f.name} (${w.toFixed(1)} кг)!`;
            } else {
                document.getElementById("result").innerText = "Сорвалось...";
            }
            localStorage.setItem("inventory", JSON.stringify(inventory));
            localStorage.setItem("stats", JSON.stringify(stats));
            updateUI(); await savePlayer(); loadData(); startCooldown(10000); 
        }, 2000);
    };

    function startCooldown(ms) {
        fishBtn.disabled = true;
        let end = Date.now() + ms;
        let t = setInterval(() => {
            let l = end - Date.now();
            if (l <= 0) { clearInterval(t); fishBtn.disabled = false; document.getElementById("timer").innerText = ""; return; }
            document.getElementById("timer").innerText = `Ждем: ${Math.ceil(l/1000)} сек.`;
        }, 1000);
    }

    updateUI(); 
    loadData();
    setInterval(loadData, 10000); // Обновляем чат и топ каждые 10 секунд
</script>
</body>
</html>
