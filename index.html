<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>🎣 Настоящая Дизайнерская Рыбалка</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --primary: #0077ff; 
            --panel: rgba(255, 255, 255, 0.9); 
            --text: #2c3e50; 
            --rare: #0077ff; 
            --epic: #8e44ad;
            --legend: #e67e22; 
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            padding: 20px; 
            color: var(--text); 
            min-height: 100vh; 
            text-align: center; 
            position: relative;
            background-color: #e0f2ff;
            background-image: linear-gradient(180deg, #6ec6ff 0%, #46af8c 100%);
            background-attachment: fixed;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none;
            background-image: 
                radial-gradient(circle at 100% 150%, #ffffff 24%, rgba(255,255,255,0) 25%),
                radial-gradient(circle at 0% 150%, #ffffff 24%, rgba(255,255,255,0) 25%),
                radial-gradient(circle at 50% 100%, rgba(255,255,255,0) 10%, #ffffff 11%, #ffffff 23%, rgba(255,255,255,0) 24%),
                radial-gradient(circle at 100% 50%, rgba(255,255,255,0) 10%, #ffffff 11%, #ffffff 23%, rgba(255,255,255,0) 24%),
                radial-gradient(circle at 0% 50%, rgba(255,255,255,0) 10%, #ffffff 11%, #ffffff 23%, rgba(255,255,255,0) 24%);
            background-size: 60px 35px;
            background-position: 0 0, 0 0, 30px 17px, 30px 17px, 30px 17px;
            opacity: 0.15; 
        }

        .container { max-width: 500px; margin: 0 auto; position: relative; z-index: 1; }
        .panel { 
            background: var(--panel); 
            padding: 20px; 
            margin-bottom: 20px; 
            border-radius: 20px; 
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.1); 
            border: 1px solid rgba(255,255,255,0.4); 
            backdrop-filter: blur(4px);
        }
        
        #rod-animation { font-size: 50px; height: 60px; display: none; margin: 10px 0; }
        .fishing-active #rod-animation { display: block; animation: cast 1s infinite ease-in-out; }
        @keyframes cast { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        #trophy-display { min-height: 250px; display: flex; align-items: center; justify-content: center; margin: 10px 0; border: 2px dashed #ddd; border-radius: 15px; background: rgba(249, 249, 249, 0.5); overflow: hidden; padding: 10px; }
        #trophy-img { width: 100%; height: 100%; max-height: 230px; display: none; animation: popIn 0.5s ease-out; border-radius: 10px; object-fit: contain; }
        #trophy-placeholder { font-size: 60px; color: #ccc; }
        @keyframes popIn { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        input, button { padding: 12px; font-size: 16px; border-radius: 10px; border: 2px solid #ddd; outline: none; }
        button { background: var(--primary); color: white; font-weight: bold; cursor: pointer; border: none; box-shadow: 0 4px 0 #0056b3; }
        button:active { transform: translateY(2px); box-shadow: 0 2px 0 #0056b3; }
        button:disabled { background: #adb5bd; box-shadow: 0 4px 0 #6c757d; cursor: not-allowed; }

        .log-box { background: rgba(255, 251, 230, 0.8); padding: 10px; border-radius: 10px; border: 1px solid #ffe58f; margin-bottom: 15px; font-size: 13px; text-align: left; }
        .log-item { display: flex; align-items: center; gap: 10px; margin-bottom: 5px; border-bottom: 1px solid rgba(0,0,0,0.05); padding-bottom: 5px; }
        .log-img { width: 35px; height: 35px; border-radius: 6px; object-fit: cover; background: #eee; }

        .rare-txt { color: var(--rare); font-weight: bold; }
        .epic-txt { color: var(--epic); font-weight: bold; }
        .legend-txt { color: var(--legend); font-weight: bold; text-shadow: 0 0 8px rgba(230, 126, 34, 0.3); }

        #chat-box { height: 130px; overflow-y: auto; background: rgba(241, 248, 255, 0.8); padding: 10px; border-radius: 10px; font-size: 14px; border: 1px solid #d0e7ff; text-align: left; margin-bottom: 10px; scroll-behavior: smooth; }
        .chat-msg { margin-bottom: 4px; border-bottom: 1px solid rgba(0,0,0,0.03); }

        #inventory { text-align: left; margin-top: 15px; border-top: 1px solid #eee; padding-top: 10px; }
        .inv-item { display: flex; align-items: center; margin-bottom: 6px; background: rgba(248, 249, 250, 0.7); padding: 6px; border-radius: 10px; }
        .inv-icon { width: 40px; height: 40px; margin-right: 12px; object-fit: cover; border-radius: 6px; }
    </style>
</head>
<body>
<div class="container">
    <h1>🎣 Мужская Рыбалка</h1>
    
    <div class="panel">
        <input type="text" id="nickname" style="width:65%" placeholder="Твой позывной...">
        <button onclick="saveNick()">💾</button>
    </div>

    <div class="panel" id="main-game">
        <div id="rod-animation">🎣</div>
        <div id="trophy-display">
            <span id="trophy-placeholder">?</span>
            <img id="trophy-img" src="" alt="Улов">
        </div>
        <div id="result" style="font-size: 18px; font-weight:bold; margin:10px 0;">Наживка готова!</div>
        <button id="fishBtn">ЗАБРОСИТЬ УДОЧКУ</button>
        <div id="timer" style="color: #e74c3c; margin-top:10px; font-weight:bold; min-height: 20px;"></div>
    </div>

    <div class="panel">
        <h3 style="margin-top:0;">📜 Кто что вытянул</h3>
        <div id="catch-log" class="log-box">Загрузка...</div>
        
        <h3 style="margin-bottom:10px;">💬 Мужские разговоры</h3>
        <div id="chat-box">Загрузка...</div>
        <div style="display:flex; gap:5px;">
            <input type="text" id="chatInput" style="flex:1" placeholder="Че как клёв?">
            <button onclick="sendMsg()" style="padding: 10px 20px;">➡️</button>
        </div>
    </div>

    <div class="panel">
        <div style="display:flex; justify-content:space-around; font-weight:bold; font-size: 18px;">
            <span>⚖️ <span id="stat-weight">0</span> кг</span>
            <span>🐟 <span id="stat-count">0</span> шт</span>
        </div>
        <div id="inventory"></div>
    </div>

    <div class="panel">
        <h3 style="margin-top:0;">🏆 Топ 10 рыболовов</h3>
        <div id="leaderboard" style="text-align:left; line-height: 1.8;">Загрузка...</div>
    </div>
</div>

<script>
    const supabaseUrl = "https://fzsmyifqmsbdkrhchrgs.supabase.co";
    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ6c215aWZxbXNiZGtyaGNocmdzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NjQ0MjAsImV4cCI6MjA5MDA0MDQyMH0.uWwvjhQL_yEaaCCUnYIYSVHj-bNdbEJ-yPACrbeJGP4";
    const db = window.supabase.createClient(supabaseUrl, supabaseKey);

    const fishes = [
        { name: "Уклейка", rarity: "common", chance: 15, minW: 0.02, maxW: 0.1, image: "https://avatars.mds.yandex.net/i?id=c6549a78d671a871bc4b2e2a70ba497febe68eda-4011145-images-thumbs&n=13" },
        { name: "Плотва", rarity: "common", chance: 15, minW: 0.1, maxW: 0.8, image: "https://avatars.mds.yandex.net/i?id=7a9554ada6dae4229dac2d6bef28d4dc4ad38dde-5294444-images-thumbs&n=13" },
        { name: "Карась", rarity: "common", chance: 12, minW: 0.2, maxW: 1.5, image: "https://i.ytimg.com/vi/Vy8rRsfMbYY/maxresdefault.jpg" },
        { name: "Окунь", rarity: "common", chance: 12, minW: 0.3, maxW: 2.0, image: "https://i.ytimg.com/vi/N55g_NvEu9c/maxresdefault.jpg" },
        { name: "Красноперка", rarity: "common", chance: 10, minW: 0.1, maxW: 0.6, image: "https://avatars.mds.yandex.net/i?id=b8462671a2ad83586df8ff0c6ebe8dc3_l-4432629-images-thumbs&n=13" },
        { name: "Лещ", rarity: "uncommon", chance: 8, minW: 1.0, maxW: 5.0, image: "https://avatars.mds.yandex.net/i?id=9cf63d5f6abe30988807f5aa110197fe_l-5848407-images-thumbs&n=13" },
        { name: "Карп", rarity: "uncommon", chance: 7, minW: 2.0, maxW: 12.0, image: "https://avatars.mds.yandex.net/i?id=1f5fc0e21d434978df4dcf0cf87e493dcb060868-5870172-images-thumbs&n=13" },
        { name: "Линь", rarity: "uncommon", chance: 6, minW: 0.5, maxW: 3.5, image: "https://avatars.mds.yandex.net/i?id=8a1b1081d346fca38a38f2673fb65b3ec7d107de-16795535-images-thumbs&n=13" },
        { name: "Щука", rarity: "rare", chance: 5, minW: 1.5, maxW: 15.0, image: "https://avatars.mds.yandex.net/i?id=fa768e0c65f5fa7d49eb004a911fd13d_l-4011302-images-thumbs&n=13" },
        { name: "Судак", rarity: "rare", chance: 4, minW: 1.0, maxW: 10.0, image: "https://avatars.mds.yandex.net/i?id=fe3b832bba015ea10e580c4a509424d67cdba11f-5306350-images-thumbs&n=13" },
        { name: "Налим", rarity: "rare", chance: 3, minW: 1.0, maxW: 8.0, image: "https://avatars.mds.yandex.net/i?id=60bd008f6f8f089542ea420285dfe843eb629550-17806471-images-thumbs&n=13" },
        { name: "Сом", rarity: "epic", chance: 2, minW: 10.0, maxW: 80.0, image: "https://avatars.mds.yandex.net/i?id=f25c27a2e5c2428546dbeb9d5642cc59c897acb0-5233251-images-thumbs&n=13" },
        { name: "Стерлядь", rarity: "epic", chance: 0.8, minW: 0.5, maxW: 4.0, image: "https://avatars.mds.yandex.net/i?id=9a170245e1e0d5f10163a3de560febf6_l-5392166-images-thumbs&n=13" },
        { name: "Золотая рыбка", rarity: "legend", chance: 0.1, minW: 0.1, maxW: 0.5, image: "https://avatars.mds.yandex.net/i?id=6f716f0df1f0e64f128187c743e49ef3_l-6516498-images-thumbs&n=13" },
        { name: "Осетр", rarity: "legend", chance: 0.1, minW: 20.0, maxW: 150.0, image: "https://i.pinimg.com/736x/a5/5a/18/a55a18d9af024706fc06549cd15d1713.jpg" }
    ];

    const trophyImg = document.getElementById("trophy-img");
    const trophyPlaceholder = document.getElementById("trophy-placeholder");
    const fishBtn = document.getElementById("fishBtn");
    const resultDiv = document.getElementById("result");
    const chatBox = document.getElementById("chat-box");

    let nickname = localStorage.getItem("nick") || "";
    document.getElementById("nickname").value = nickname;

    let stats = JSON.parse(localStorage.getItem("stats")) || { caught: 0, totalWeight: 0 };
    let inventory = JSON.parse(localStorage.getItem("inventory")) || {};

    function updateUI() {
        document.getElementById("stat-weight").innerText = stats.totalWeight.toFixed(1);
        document.getElementById("stat-count").innerText = stats.caught;
        let invHtml = "<h4>🎒 Мой садок:</h4>";
        for (let name in inventory) {
            let f = fishes.find(x => x.name === name);
            if(f) invHtml += `<div class="inv-item"><img src="${f.image}" class="inv-icon"> <div><b>${name}</b><br><small>${inventory[name].count} шт. — ${inventory[name].weight.toFixed(1)} кг</small></div></div>`;
        }
        document.getElementById("inventory").innerHTML = Object.keys(inventory).length ? invHtml : "";
    }

    function saveNick() {
        nickname = document.getElementById("nickname").value.trim();
        if(!nickname) return alert("Представься сначала!");
        localStorage.setItem("nick", nickname);
        alert("Позывной записан!");
        savePlayer();
    }

    async function savePlayer() {
        if (!nickname) return;
        try {
            await db.from("players").upsert({ nickname: nickname, fish: Number(stats.totalWeight.toFixed(1)) }, { onConflict: 'nickname' });
        } catch(e) {}
    }

    async function sendMsg() {
        const input = document.getElementById("chatInput");
        const txt = input.value.trim();
        if(!nickname) return alert("Сначала представься!");
        if(!txt) return;
        try {
            await db.from("messages").insert([{ nickname, text: txt }]);
            input.value = "";
            loadData();
        } catch(e) {}
    }

    async function loadData() {
        try {
            const { data: top } = await db.from("players").select("*").order("fish", { ascending: false }).limit(10);
            if (top) document.getElementById("leaderboard").innerHTML = top.map((p, i) => `<b>${i+1}.</b> ${p.nickname} — ⚖️ <b>${p.fish} кг</b>`).join("<br>");
            
            const { data: msgs } = await db.from("messages").select("*").order("id", { ascending: true }).limit(20);
            if (msgs) {
                chatBox.innerHTML = msgs.map(m => `<div class="chat-msg"><b>${m.nickname}:</b> ${m.text}</div>`).join("");
                chatBox.scrollTop = chatBox.scrollHeight;
            }

            const { data: history } = await db.from("catches").select("*").order("id", { ascending: false }).limit(5);
            if (history) {
                document.getElementById("catch-log").innerHTML = history.map(h => {
                    let f = fishes.find(x => x.name === h.fish_name);
                    let img = f ? f.image : "";
                    let rClass = "";
                    if(f) {
                        if(f.rarity === 'rare') rClass = "rare-txt";
                        else if(f.rarity === 'epic') rClass = "epic-txt";
                        else if(f.rarity === 'legend') rClass = "legend-txt";
                    }
                    return `<div class="log-item"><img src="${img}" class="log-img"> <span><b>${h.nickname}</b> вытянул <b class="${rClass}">${h.fish_name}</b> (${h.weight.toFixed(1)}кг)</span></div>`;
                }).join("");
            }
        } catch (e) {}
    }

    fishBtn.onclick = async function() {
        if (!nickname) return alert("Введи имя и нажми на дискету!");
        
        fishBtn.disabled = true;
        trophyImg.style.display = "none";
        trophyPlaceholder.style.display = "block";
        document.getElementById("main-game").classList.add("fishing-active");
        resultDiv.innerText = "Плеск воды... Ждём поклевку...";

        setTimeout(async () => {
            document.getElementById("main-game").classList.remove("fishing-active");
            if (Math.random() < 0.75) {
                let totalChance = fishes.reduce((s, f) => s + f.chance, 0);
                let roll = Math.random() * totalChance;
                let sum = 0, f = fishes[0];
                for (let x of fishes) { sum += x.chance; if (roll < sum) { f = x; break; } }
                
                let w = Math.random() * (f.maxW - f.minW) + f.minW;
                stats.caught++; 
                stats.totalWeight += w;
                if(!inventory[f.name]) inventory[f.name] = { count: 0, weight: 0 };
                inventory[f.name].count++;
                inventory[f.name].weight += w;

                trophyImg.src = f.image;
                trophyImg.style.display = "block";
                trophyPlaceholder.style.display = "none";
                
                let rarityClass = (f.rarity === 'rare') ? 'rare-txt' : (f.rarity === 'epic' ? 'epic-txt' : (f.rarity === 'legend' ? 'legend-txt' : ''));
                resultDiv.innerHTML = `ЕСТЬ! Попалась <span class="${rarityClass}">${f.name}</span> на ${w.toFixed(1)} кг!`;
                
                await db.from("catches").insert([{ nickname, fish_name: f.name, weight: w }]);
            } else {
                resultDiv.innerText = "Эх, сорвалась... Ушла рыба!";
            }
            
            localStorage.setItem("stats", JSON.stringify(stats));
            localStorage.setItem("inventory", JSON.stringify(inventory));
            updateUI(); 
            savePlayer(); 
            startCooldown(600000); // 10 минут
        }, 2500);
    };

    // ФУНКЦИЯ ЗАПУСКА КУЛДАУНА
    function startCooldown(ms) {
        let endTime = Date.now() + ms;
        localStorage.setItem("cooldownEnd", endTime);
        runTimer(endTime);
    }

    // ЛОГИКА ТАЙМЕРА
    function runTimer(endTime) {
        fishBtn.disabled = true;
        if (window.fishTimer) clearInterval(window.fishTimer);

        window.fishTimer = setInterval(() => {
            let remaining = endTime - Date.now();
            
            if (remaining <= 0) {
                clearInterval(window.fishTimer);
                fishBtn.disabled = false;
                document.getElementById("timer").innerText = "";
                localStorage.removeItem("cooldownEnd");
                return;
            }

            let minutes = Math.floor(remaining / 60000);
            let seconds = Math.ceil((remaining % 60000) / 1000);
            seconds = seconds < 10 ? '0' + seconds : seconds;
            document.getElementById("timer").innerText = `Заброс через: ${minutes}:${seconds}`;
        }, 1000);
    }

    // ПРОВЕРКА ПРИ ЗАГРУЗКЕ СТРАНИЦЫ
    const savedCooldown = localStorage.getItem("cooldownEnd");
    if (savedCooldown) {
        const remaining = parseInt(savedCooldown) - Date.now();
        if (remaining > 0) {
            runTimer(parseInt(savedCooldown));
        } else {
            localStorage.removeItem("cooldownEnd");
        }
    }

    updateUI(); 
    loadData();
    setInterval(loadData, 7000);
</script>
</body>
</html>
