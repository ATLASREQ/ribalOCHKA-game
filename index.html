<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>🎣 Дизайнерская Рыбалка: v4.7 (Fix Build)</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --primary: #0077ff; --panel: rgba(255, 255, 255, 0.9); --text: #2c3e50; 
            --rare: #0077ff; --epic: #8e44ad; --legend: #e67e22; 
            --net-red: #e74c3c; --xp-yellow: #fcc419;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; color: var(--text); min-height: 100vh; text-align: center;
            background: url('https://fzsmyifqmsbdkrhchrgs.supabase.co/storage/v1/object/public/images/hd_04b997bd6476360f3a6f9f0cc60e35e9.png') no-repeat center center fixed;
            background-size: cover;
        }

        .container { max-width: 500px; margin: 0 auto; position: relative; z-index: 1; }
        .panel { 
            background: var(--panel); padding: 20px; margin-bottom: 20px; border-radius: 20px; 
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.1); border: 1px solid rgba(255,255,255,0.4); 
            backdrop-filter: blur(4px); 
        }
        
        .hidden { display: none !important; }

        #trophy-display { 
            min-height: 250px; display: flex; align-items: center; justify-content: center; 
            margin: 10px 0; border: 2px dashed #b3d7ff; border-radius: 20px; 
            background: rgba(240, 248, 255, 0.6); 
            overflow: hidden; padding: 0; transition: all 0.4s ease;
            position: relative;
        }
        
        .glow-rare { box-shadow: 0 0 25px var(--rare); border: 2px solid var(--rare) !important; }
        .glow-epic { box-shadow: 0 0 30px var(--epic); border: 2px solid var(--epic) !important; }
        .glow-legend { box-shadow: 0 0 40px var(--legend); border: 2px solid var(--legend) !important; }

        #trophy-placeholder { 
            width: 130px; height: 130px; opacity: 0.8; object-fit: contain;
            animation: bobbing 2s ease-in-out infinite;
        }

        @keyframes bobbing {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(5deg); }
        }

        @keyframes struggle {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

        .fishing-active #trophy-placeholder {
            animation: struggle 0.2s linear infinite !important;
            filter: drop-shadow(0 0 10px #0077ff);
        }

        #trophy-img { 
            width: 100%; height: 100%; max-height: 250px; 
            display: none; animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            object-fit: cover; border-radius: 20px;
        }
        @keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        .xp-container { margin: 15px 0 5px 0; text-align: left; }
        .xp-label { font-size: 12px; font-weight: bold; margin-bottom: 4px; display: flex; justify-content: space-between; }
        .xp-bar-bg { width: 100%; height: 12px; background: rgba(0,0,0,0.1); border-radius: 10px; overflow: hidden; border: 1px solid rgba(0,0,0,0.05); }
        #xp-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #fcc419, #ffec99); transition: width 0.5s ease; }

        .cast-group { display: flex; gap: 10px; margin: 10px 0 5px 0; }
        
        .bait-group { 
            display: flex; 
            justify-content: center; 
            gap: 8px; 
            margin-top: 15px;
            margin-bottom: 15px; 
        }
        .bait-btn { 
            width: 50px; height: 50px; padding: 5px; background: white; 
            border: 2px solid #ddd; border-radius: 12px; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 20px; transition: all 0.2s;
        }
        .bait-btn span { font-size: 8px; font-weight: bold; text-transform: uppercase; margin-top: 2px; color: #777; }
        .bait-btn.active { border-color: var(--primary); background: #eef6ff; transform: scale(1.1); box-shadow: 0 4px 10px rgba(0,119,255,0.2); }
        .bait-btn.active span { color: var(--primary); }

        input, button { padding: 12px; font-size: 16px; border-radius: 10px; border: 2px solid #ddd; outline: none; }
        button { background: var(--primary); color: white; font-weight: bold; cursor: pointer; border: none; box-shadow: 0 4px 0 #0056b3; }
        button:active { transform: translateY(2px); box-shadow: 0 2px 0 #0056b3; }
        button:disabled { background: #adb5bd !important; box-shadow: 0 4px 0 #6c757d !important; cursor: not-allowed; opacity: 0.7; }

        #netBtn { width: 60px; background: var(--net-red); box-shadow: 0 4px 0 #c0392b; font-size: 24px; padding: 0; }

        #best-catch-box { 
            background: linear-gradient(135deg, #fff9db 0%, #fff3bf 100%);
            border: 2px solid #fcc419; border-radius: 15px; padding: 10px;
            margin: 15px 0; display: none; align-items: center; gap: 15px;
        }

        .log-box { background: #fff9db; padding: 10px; border-radius: 10px; border: 1px solid #ddd; margin-bottom: 15px; font-size: 13px; text-align: left; }
        .log-item { display: flex; align-items: center; gap: 10px; margin-bottom: 5px; border-bottom: 1px solid rgba(0,0,0,0.05); padding-bottom: 5px; }
        .log-img { width: 35px; height: 35px; border-radius: 6px; object-fit: cover; }

        #chat-box { height: 150px; overflow-y: auto; background: rgba(255, 255, 255, 0.8); padding: 10px; border-radius: 10px; font-size: 14px; text-align: left; margin-bottom: 10px; border: 1px solid #ddd; }
        .chat-line { margin-bottom: 4px; border-bottom: 1px solid rgba(0,0,0,0.03); padding-bottom: 2px; }
        
        #inventory-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .inv-item { display: flex; align-items: center; background: rgba(255, 255, 255, 0.8); padding: 8px; border-radius: 12px; border: 1px solid rgba(0,0,0,0.05); }
        .inv-icon { width: 35px; height: 35px; margin-right: 8px; object-fit: cover; border-radius: 6px; }

        .rare-txt { color: var(--rare) !important; font-weight: bold !important; }
        .epic-txt { color: var(--epic) !important; font-weight: bold !important; }
        .legend-txt { color: var(--legend) !important; font-weight: bold !important; }
    </style>
</head>
<body>
<div class="container">
    <h1 style="color: white; text-shadow: 2px 2px 4px rgba(0,0,0,0.5);">🎣 Дизайнерская Рыбалка</h1>
    
    <div class="panel" id="auth-panel">
        <input type="text" id="nickname" style="width:65%" placeholder="Твой позывной...">
        <button onclick="saveNick()">💾</button>
    </div>

    <div class="panel" id="main-game">
        <div id="trophy-display">
            <img id="trophy-placeholder" src="https://fzsmyifqmsbdkrhchrgs.supabase.co/storage/v1/object/public/images/hook-illustration.png">
            <img id="trophy-img" src="">
        </div>
        <div id="result" style="font-size: 18px; font-weight:bold; margin:10px 0;">Проверка снастей...</div>
        
        <div class="xp-container">
            <div class="xp-label">
                <span>Уровень <span id="lvl-val">1</span></span>
                <span><span id="xp-val">0</span> / <span id="xp-max">100</span> XP</span>
            </div>
            <div class="xp-bar-bg"><div id="xp-fill"></div></div>
        </div>

        <div class="cast-group">
            <button id="fishBtn" style="flex:1" disabled>ЗАБРОСИТЬ УДОЧКУ</button>
            <button id="netBtn" disabled>🕸️</button>
        </div>

        <div class="bait-group">
            <div class="bait-btn active" onclick="setBait('worm', this)">🪱<span>Червь</span></div>
            <div class="bait-btn" onclick="setBait('maggot', this)">🐛<span>Опарыш</span></div>
            <div class="bait-btn" onclick="setBait('lure', this)">✨<span>Блесна</span></div>
            <div class="bait-btn" onclick="setBait('corn', this)">🌽<span>Кукуруза</span></div>
        </div>

        <div id="timer" style="color: #e74c3c; font-weight:bold; min-height: 20px;"></div>
    </div>

    <div class="panel">
        <h3 style="margin-top:0;">📜 История улова</h3>
        <div id="catch-log" class="log-box">Загрузка...</div>
        <h3 style="margin-bottom:10px;">💬 Разговоры о важном</h3>
        <div id="chat-box"></div>
        <div style="display:flex; gap:5px;">
            <input type="text" id="chatInput" style="flex:1" placeholder="Че как клёв?">
            <button onclick="sendMsg()">➡️</button>
        </div>
    </div>

    <div class="panel">
        <div style="display:flex; justify-content:space-around; font-weight:bold; font-size: 18px; border-bottom: 1px solid #eee; padding-bottom: 10px;">
            <span>⚖️ <span id="stat-weight">0</span> кг</span>
            <span>🐟 <span id="stat-count">0</span> шт</span>
        </div>
        <div id="best-catch-box">
            <div style="font-size: 24px;">🏆</div>
            <div style="text-align: left; font-size: 13px;">
                <b>Рекорд:</b> <span id="best-name">...</span><br>Вес: <b id="best-weight">0</b> кг
            </div>
            <img id="best-img" src="" style="width: 50px; height: 50px; margin-left: auto; object-fit: cover; border-radius: 8px;">
        </div>
        <h4 style="margin: 15px 0 5px 0;">🎒 Мой садок:</h4>
        <div id="inventory-grid"></div>
    </div>

    <div class="panel">
        <h3 style="margin-top:0;">🏆 Топ рыболовов</h3>
        <div id="leaderboard" style="text-align:left;">...</div>
    </div>
</div>

<script>
    const supabaseUrl = "https://fzsmyifqmsbdkrhchrgs.supabase.co";
    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ6c215aWZxbXNiZGtyaGNocmdzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NjQ0MjAsImV4cCI6MjA5MDA0MDQyMH0.uWwvjhQL_yEaaCCUnYIYSVHj-bNdbEJ-yPACrbeJGP4";
    const db = window.supabase.createClient(supabaseUrl, supabaseKey);

    const fishes = [
        { name: "Старый сапог", rarity: "common", chance: 5, minW: 0.7, maxW: 0.7, xp: 0, image: "https://fzsmyifqmsbdkrhchrgs.supabase.co/storage/v1/object/public/images/png-transparent-boots-shoe-hiking-broken-leather-footwear-obsolete-dirty-vintage-grunge.png", type: "trash" },
        { name: "Консервная банка", rarity: "common", chance: 4, minW: 0.2, maxW: 0.2, xp: 0, image: "https://fzsmyifqmsbdkrhchrgs.supabase.co/storage/v1/object/public/images/pngtree-rusty-tin-can-isolated-on-white-isolated-picture-image_13070033.png", type: "trash" },
        { name: "Ржавая цепь", rarity: "common", chance: 3, minW: 2.5, maxW: 2.5, xp: 0, image: "https://fzsmyifqmsbdkrhchrgs.supabase.co/storage/v1/object/public/images/Rusty_chain_on_wooden_deck_in_Loddebo.jpg", type: "trash" },
        { name: "Пластиковая бутылка", rarity: "common", chance: 3, minW: 0.1, maxW: 0.1, xp: 0, image: "https://fzsmyifqmsbdkrhchrgs.supabase.co/storage/v1/object/public/images/360_F_21770579_J48bIXW1eWGV6VRY5E8wMslwTHcrVYqe.jpg", type: "trash" },
        { name: "Уклейка", rarity: "common", chance: 15, minW: 0.02, maxW: 0.1, xp: 10, image: "https://avatars.mds.yandex.net/i?id=c6549a78d671a871bc4b2e2a70ba497febe68eda-4011145-images-thumbs&n=13", type: "peaceful" },
        { name: "Плотва", rarity: "common", chance: 15, minW: 0.1, maxW: 0.8, xp: 12, image: "https://avatars.mds.yandex.net/i?id=7a9554ada6dae4229dac2d6bef28d4dc4ad38dde-5294444-images-thumbs&n=13", type: "peaceful" },
        { name: "Карась", rarity: "common", chance: 12, minW: 0.2, maxW: 1.5, xp: 15, image: "https://i.ytimg.com/vi/Vy8rRsfMbYY/maxresdefault.jpg", type: "peaceful" },
        { name: "Окунь", rarity: "common", chance: 12, minW: 0.3, maxW: 2.0, xp: 18, image: "https://i.ytimg.com/vi/N55g_NvEu9c/maxresdefault.jpg", type: "predator" },
        { name: "Красноперка", rarity: "common", chance: 10, minW: 0.1, maxW: 0.5, xp: 12, image: "https://fzsmyifqmsbdkrhchrgs.supabase.co/storage/v1/object/public/images/Krasnoperka.png", type: "peaceful" },
        { name: "Густера", rarity: "common", chance: 8, minW: 0.2, maxW: 1.2, xp: 15, image: "https://fzsmyifqmsbdkrhchrgs.supabase.co/storage/v1/object/public/images/Gustera.png", type: "peaceful" },
        { name: "Лещ", rarity: "rare", chance: 6, minW: 1.0, maxW: 5.0, xp: 40, image: "https://fzsmyifqmsbdkrhchrgs.supabase.co/storage/v1/object/public/images/Lesh.png", type: "peaceful" },
        { name: "Линь", rarity: "rare", chance: 5, minW: 0.8, maxW: 4.0, xp: 45, image: "https://fzsmyifqmsbdkrhchrgs.supabase.co/storage/v1/object/public/images/lin.png", type: "peaceful" },
        { name: "Щука", rarity: "rare", chance: 5, minW: 1.5, maxW: 15.0, xp: 50, image: "https://avatars.mds.yandex.net/i?id=fa768e0c65f5fa7d49eb004a911fd13d_l-4011302-images-thumbs&n=13", type: "predator" },
        { name: "Судак", rarity: "epic", chance: 3, minW: 2.0, maxW: 12.0, xp: 100, image: "https://fzsmyifqmsbdkrhchrgs.supabase.co/storage/v1/object/public/images/Sudak.png", type: "predator" },
        { name: "Карп", rarity: "epic", chance: 3, minW: 2.0, maxW: 12.0, xp: 100, image: "https://fzsmyifqmsbdkrhchrgs.supabase.co/storage/v1/object/public/images/Karp.png", type: "predator" },
        { name: "Налим", rarity: "epic", chance: 3, minW: 1.5, maxW: 10.0, xp: 110, image: "https://fzsmyifqmsbdkrhchrgs.supabase.co/storage/v1/object/public/images/Nalim.png", type: "predator" },
        { name: "Сом", rarity: "epic", chance: 2, minW: 10.0, maxW: 80.0, xp: 150, image: "https://avatars.mds.yandex.net/i?id=f25c27a2e5c2428546dbeb9d5642cc59c897acb0-5233251-images-thumbs&n=13", type: "predator" },
        { name: "Осетр", rarity: "legend", chance: 0.5, minW: 20.0, maxW: 150.0, xp: 600, image: "https://i.pinimg.com/736x/a5/5a/18/a55a18d9af024706fc06549cd15d1713.jpg", type: "peaceful" },
        { name: "Белуга", rarity: "legend", chance: 0.3, minW: 50.0, maxW: 300.0, xp: 1000, image: "https://fzsmyifqmsbdkrhchrgs.supabase.co/storage/v1/object/public/images/Beluga.png", type: "peaceful" },
        { name: "Золотая рыбка", rarity: "legend", chance: 0.1, minW: 0.1, maxW: 0.5, xp: 2000, image: "https://fzsmyifqmsbdkrhchrgs.supabase.co/storage/v1/object/public/images/Zolota.png", type: "legendary" }
    ];

    let currentBait = 'worm';
    let nickname = localStorage.getItem("nick") || "";
    let inventory = {}; 
    let stats = { caught: 0, totalWeight: 0, xp: 0, level: 1 }; 
    let bestF = { weight: 0 };
    let timerInterval = null;

    function setBait(type, el) {
        currentBait = type;
        document.querySelectorAll('.bait-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
    }

    function getNickColor(name) {
        let hash = 0; for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
        let color = '#'; for (let i = 0; i < 3; i++) color += ('00' + ((hash >> (i * 8)) & 0xAA).toString(16)).substr(-2);
        return color;
    }

    function getRarityClass(rarity) {
        if (rarity === 'rare') return 'rare-txt';
        if (rarity === 'epic') return 'epic-txt';
        if (rarity === 'legend') return 'legend-txt';
        return '';
    }

    function applyGlow(rarity) {
        const disp = document.getElementById("trophy-display");
        disp.classList.remove("glow-rare", "glow-epic", "glow-legend");
        if(rarity !== 'common') disp.classList.add('glow-' + rarity);
    }

    async function addXP(amount) {
        stats.xp += amount;
        let nextLvlXp = Math.floor(100 * Math.pow(1.2, stats.level - 1));
        while (stats.xp >= nextLvlXp) {
            stats.xp -= nextLvlXp;
            stats.level++;
            nextLvlXp = Math.floor(100 * Math.pow(1.2, stats.level - 1));
        }
    }

    async function syncInventory() {
        if (!nickname) return;
        const { data: catches } = await db.from("catches").select("*").eq("nickname", nickname);
        const { data: player } = await db.from("players").select("*").eq("nickname", nickname).single();
        inventory = {}; 
        stats = { caught: 0, totalWeight: 0, xp: player?.xp || 0, level: player?.level || 1 };
        bestF = { weight: 0 };
        
        if (catches) catches.forEach(c => {
            if (!inventory[c.fish_name]) inventory[c.fish_name] = { count: 0, weight: 0 };
            inventory[c.fish_name].count++; inventory[c.fish_name].weight += c.weight;
            stats.caught++; stats.totalWeight += c.weight;
            if (c.weight > bestF.weight) bestF = { weight: c.weight, name: c.fish_name, img: fishes.find(f=>f.name===c.fish_name)?.image };
        });
        updateUI(); 
        checkTimers();
    }

    function updateUI() {
        document.getElementById("stat-weight").innerText = stats.totalWeight.toFixed(1);
        document.getElementById("stat-count").innerText = stats.caught;
        const nextLvlXp = Math.floor(100 * Math.pow(1.2, stats.level - 1));
        document.getElementById("lvl-val").innerText = stats.level;
        document.getElementById("xp-val").innerText = stats.xp;
        document.getElementById("xp-max").innerText = nextLvlXp;
        document.getElementById("xp-fill").style.width = Math.min(100, (stats.xp / nextLvlXp) * 100) + "%";
        if (bestF.weight > 0) {
            document.getElementById("best-catch-box").style.display = "flex";
            document.getElementById("best-name").innerText = bestF.name;
            document.getElementById("best-weight").innerText = bestF.weight.toFixed(1);
            document.getElementById("best-img").src = bestF.img;
        }
        let html = "";
        for (let name in inventory) {
            let f = fishes.find(x => x.name === name);
            if(f) html += `<div class="inv-item"><img src="${f.image}" class="inv-icon"><div><b>${name}</b><br>${inventory[name].count} шт.</div></div>`;
        }
        document.getElementById("inventory-grid").innerHTML = html;
    }

    async function checkTimers() {
        if (!nickname) return;
        
        document.getElementById("fishBtn").disabled = true;
        document.getElementById("netBtn").disabled = true;

        const { data } = await db.from("players").select("*").eq("nickname", nickname).single();
        if (data) {
            // Удочка: 10 минут (600000 мс)
            const castEnd = data.last_cast ? new Date(data.last_cast).getTime() + 600000 : 0; 
            if (castEnd > Date.now()) {
                runTimer(castEnd);
            } else {
                document.getElementById("fishBtn").disabled = false;
                document.getElementById("result").innerText = "Снасти готовы!";
            }
            
            // Сеть: 24 часа (86400000 мс)
            const netEnd = data.last_net_cast ? new Date(data.last_net_cast).getTime() + 86400000 : 0;
            document.getElementById("netBtn").disabled = (netEnd > Date.now());
        } else {
            document.getElementById("fishBtn").disabled = false;
            document.getElementById("netBtn").disabled = false;
            document.getElementById("result").innerText = "Добро пожаловать!";
        }
    }

    function runTimer(end) {
        const btn = document.getElementById("fishBtn");
        btn.disabled = true;
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            let left = end - Date.now();
            if(left <= 0) { 
                clearInterval(timerInterval); 
                btn.disabled = false; 
                document.getElementById("timer").innerText = ""; 
                document.getElementById("result").innerText = "Клёв пошёл!";
                return; 
            }
            let mins = Math.floor(left / 60000);
            let secs = Math.ceil((left % 60000) / 1000);
            document.getElementById("timer").innerText = `Удочка через: ${mins}м ${secs}с`;
        }, 500);
    }

    async function saveNick() {
        nickname = document.getElementById("nickname").value.trim();
        if(!nickname) return; localStorage.setItem("nick", nickname);
        document.getElementById("auth-panel").classList.add("hidden"); 
        syncInventory();
    }

    async function loadData() {
        try {
            const { data: top } = await db.from("players").select("*").order("fish", { ascending: false }).limit(10);
            if (top) document.getElementById("leaderboard").innerHTML = top.map((p, i) => `<b>${i+1}.</b> ${p.nickname}: ⚖️ <b>${p.fish} кг</b> (Lvl ${p.level || 1})`).join("<br>");
            const { data: msgs } = await db.from("messages").select("*").order("id", { ascending: false }).limit(10);
            if (msgs) document.getElementById("chat-box").innerHTML = [...msgs].reverse().map(m => `<div class="chat-line"><b style="color:${getNickColor(m.nickname)}">${m.nickname}</b>: ${m.text}</div>`).join("");
            const { data: hist } = await db.from("catches").select("*").order("id", { ascending: false }).limit(5);
            if (hist) document.getElementById("catch-log").innerHTML = hist.map(h => {
                const fishData = fishes.find(x => x.name === h.fish_name);
                const rClass = getRarityClass(fishData?.rarity);
                return `<div class="log-item"><img src="${fishData?.image}" class="log-img"> <span><b style="color:${getNickColor(h.nickname)}">${h.nickname}</b>: <span class="${rClass}">${h.fish_name}</span> (${h.weight.toFixed(1)}кг)</span></div>`;
            }).join("");
        } catch (e) {}
    }

    document.getElementById("fishBtn").onclick = async function() {
        if (!nickname) return;
        
        const { data: check } = await db.from("players").select("last_cast").eq("nickname", nickname).single();
        if (check && check.last_cast) {
            const wait = new Date(check.last_cast).getTime() + 600000;
            if (wait > Date.now()) {
                alert("Рано! Рыба ещё не вернулась.");
                checkTimers();
                return;
            }
        }

        const display = document.getElementById("trophy-display");
        const placeholder = document.getElementById("trophy-placeholder");
        const trophyImg = document.getElementById("trophy-img");
        this.disabled = true; 
        document.getElementById("result").innerText = "Заброс на " + currentBait + "...";
        trophyImg.style.display = "none";
        placeholder.style.display = "block";
        display.classList.remove("glow-rare", "glow-epic", "glow-legend");
        display.classList.add("fishing-active");

        await db.from("players").upsert({ nickname, last_cast: new Date().toISOString() }, { onConflict: 'nickname' });
        runTimer(Date.now() + 600000);

        setTimeout(async () => {
            display.classList.remove("fishing-active");
            let baitModifiedFishes = fishes.map(f => {
                let m = 1.0;
                if (currentBait === 'worm' && f.rarity === 'common') m = 1.2;
                if (currentBait === 'maggot') { if(f.type === 'peaceful') m = 2.0; if(f.type === 'trash') m = 0.5; }
                if (currentBait === 'corn' && (f.name === 'Карась' || f.name === 'Белуга')) m = 3.0;
                if (currentBait === 'lure') m = (f.type === 'predator') ? 4.0 : 0.1;
                return { ...f, tempChance: f.chance * m };
            });

            let total = baitModifiedFishes.reduce((s, f) => s + f.tempChance, 0);
            let roll = Math.random() * total, sum = 0, f = fishes[0];
            for (let x of baitModifiedFishes) { sum += x.tempChance; if (roll < sum) { f = x; break; } }

            let w = Number((Math.random() * (f.maxW - f.minW) + f.minW).toFixed(1));
            applyGlow(f.rarity);
            trophyImg.src = f.image; trophyImg.style.display = "block";
            placeholder.style.display = "none";
            document.getElementById("result").innerHTML = `Улов: <span class="${getRarityClass(f.rarity)}">${f.name}</span> (${w}кг)`;
            
            await db.from("catches").insert([{ nickname, fish_name: f.name, weight: w }]);
            await addXP(f.xp);
            
            const newTotal = Number((stats.totalWeight + w).toFixed(1));
            await db.from("players").upsert({ nickname, xp: stats.xp, level: stats.level, fish: newTotal }, { onConflict: 'nickname' });
            
            syncInventory(); loadData();
        }, 2500);
    };

    document.getElementById("netBtn").onclick = async function() {
        if (!nickname) return;
        
        const { data: check } = await db.from("players").select("last_net_cast").eq("nickname", nickname).single();
        if (check && check.last_net_cast) {
            const wait = new Date(check.last_net_cast).getTime() + 86400000;
            if (wait > Date.now()) {
                alert("Сеть ещё чинят!");
                checkTimers();
                return;
            }
        }

        this.disabled = true; 
        document.getElementById("result").innerText = "Тянем сеть... 🕸️";
        document.getElementById("trophy-display").classList.add("fishing-active");

        await db.from("players").upsert({ nickname, last_net_cast: new Date().toISOString() }, { onConflict: 'nickname' });
        
        let count = 0;
        let sessionWeight = 0;
        let int = setInterval(async () => {
            let total = fishes.reduce((s, f) => s + f.chance, 0);
            let roll = Math.random() * total, sum = 0, f = fishes[0];
            for (let x of fishes) { sum += x.chance; if (roll < sum) { f = x; break; } }
            
            let w = Number((Math.random() * (f.maxW - f.minW) + f.minW).toFixed(1));
            sessionWeight += w;

            applyGlow(f.rarity);
            document.getElementById("trophy-img").src = f.image; 
            document.getElementById("trophy-img").style.display = "block";
            document.getElementById("trophy-placeholder").style.display = "none";
            document.getElementById("result").innerHTML = `В сети: <span class="${getRarityClass(f.rarity)}">${f.name}</span>!`;
            
            await db.from("catches").insert([{ nickname, fish_name: f.name, weight: w }]);
            await addXP(f.xp);
            
            count++;
            if(count >= 5) { 
                clearInterval(int); 
                document.getElementById("trophy-display").classList.remove("fishing-active");
                const finalWeight = Number((stats.totalWeight + sessionWeight).toFixed(1));
                await db.from("players").upsert({ nickname, xp: stats.xp, level: stats.level, fish: finalWeight }, { onConflict: 'nickname' });
                syncInventory(); document.getElementById("result").innerText = "Сеть выбрана! 🦾"; loadData(); 
            }
        }, 800);
    };

    async function sendMsg() {
        const inp = document.getElementById("chatInput");
        if(!nickname || !inp.value.trim()) return;
        await db.from("messages").insert([{ nickname, text: inp.value.trim() }]);
        inp.value = ""; loadData();
    }

    window.onload = function() {
        if (nickname) { 
            document.getElementById("auth-panel").classList.add("hidden"); 
            syncInventory(); 
        } else {
            document.getElementById("result").innerText = "Представься, рыбак!";
        }
        loadData(); 
        setInterval(loadData, 10000);
    };
</script>
</body>
</html>
