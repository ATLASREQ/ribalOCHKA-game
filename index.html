<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>🎣 Гранд Рыбалка: Полная версия</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #0077ff; --bg: #e0f2ff; --panel: #ffffff; --text: #2c3e50; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); background-image: linear-gradient(180deg, #6ec6ff 0%, #e0f2ff 100%); margin: 0; padding: 20px; color: var(--text); min-height: 100vh; text-align: center; }
        .container { max-width: 500px; margin: 0 auto; }
        .panel { background: var(--panel); padding: 20px; margin-bottom: 20px; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.08); border: 1px solid rgba(255,255,255,0.3); position: relative; }
        
        /* Анимация удочки */
        #rod-animation { font-size: 50px; height: 60px; display: none; margin: 10px 0; }
        .fishing-active #rod-animation { display: block; animation: cast 1s infinite ease-in-out; }
        @keyframes cast { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        #trophy-display { min-height: 150px; display: flex; align-items: center; justify-content: center; margin: 10px 0; border: 2px dashed #ddd; border-radius: 15px; background: #f9f9f9; overflow: hidden; }
        #trophy-img { max-width: 140px; max-height: 140px; display: none; animation: popIn 0.5s ease-out; border-radius: 10px; object-fit: cover; }
        #trophy-placeholder { font-size: 50px; color: #ccc; }
        @keyframes popIn { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        input, button { padding: 12px; font-size: 16px; border-radius: 10px; border: 2px solid #ddd; outline: none; }
        button { background: var(--primary); color: white; font-weight: bold; cursor: pointer; border: none; box-shadow: 0 4px 0 #0056b3; }
        button:active { transform: translateY(2px); box-shadow: 0 2px 0 #0056b3; }
        button:disabled { background: #adb5bd; box-shadow: 0 4px 0 #6c757d; }

        .log-box { background: #fffbe6; padding: 10px; border-radius: 10px; border: 1px solid #ffe58f; margin-bottom: 15px; font-size: 13px; text-align: left; }
        .log-item { display: flex; align-items: center; gap: 10px; margin-bottom: 5px; border-bottom: 1px solid rgba(0,0,0,0.05); padding-bottom: 3px; }
        .log-img { width: 30px; height: 30px; border-radius: 5px; object-fit: cover; }

        #chat-box { height: 120px; overflow-y: auto; background: #f1f8ff; padding: 10px; border-radius: 10px; font-size: 14px; border: 1px solid #d0e7ff; text-align: left; }
        
        #inventory { text-align: left; margin-top: 10px; }
        .inv-item { display: flex; align-items: center; margin-bottom: 5px; background: #f8f9fa; padding: 5px; border-radius: 8px; }
        .inv-icon { width: 35px; height: 35px; margin-right: 12px; object-fit: cover; border-radius: 5px; }
    </style>
</head>
<body>
<div class="container">
    <h1>🎣 Гранд Рыбалка</h1>
    
    <div class="panel">
        <input type="text" id="nickname" style="width:70%" placeholder="Ник...">
        <button onclick="saveNick()">💾</button>
    </div>

    <div class="panel" id="main-game">
        <div id="rod-animation">🎣</div>
        <div id="trophy-display">
            <span id="trophy-placeholder">?</span>
            <img id="trophy-img" src="">
        </div>
        <div id="result" style="font-weight:bold; margin:10px 0;">Удачного клева!</div>
        <button id="fishBtn">ЗАБРОСИТЬ</button>
        <div id="timer" style="color: #e74c3c; margin-top:10px; font-weight:bold;"></div>
    </div>

    <div class="panel">
        <h3>📜 История уловов</h3>
        <div id="catch-log" class="log-box">...</div>
        
        <h3>💬 Чат</h3>
        <div id="chat-box">...</div>
        <div style="display:flex; gap:5px; margin-top:10px;">
            <input type="text" id="chatInput" style="flex:1" placeholder="Сообщение...">
            <button onclick="sendMsg()">➡️</button>
        </div>
    </div>

    <div class="panel">
        <div style="display:flex; justify-content:space-around; font-weight:bold; font-size: 18px;">
            <span>⚖️ <span id="stat-weight">0</span> кг</span>
            <span>🐟 <span id="stat-count">0</span> шт</span>
        </div>
        <div id="inventory"></div>
    </div>

    <div class="panel">
        <h3>🏆 Топ 10</h3>
        <div id="leaderboard" style="text-align:left;">...</div>
    </div>
</div>

<script>
    const supabaseUrl = "https://fzsmyifqmsbdkrhchrgs.supabase.co";
    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ6c215aWZxbXNiZGtyaGNocmdzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NjQ0MjAsImV4cCI6MjA5MDA0MDQyMH0.uWwvjhQL_yEaaCCUnYIYSVHj-bNdbEJ-yPACrbeJGP4";
    const db = window.supabase.createClient(supabaseUrl, supabaseKey);

    const fishes = [
        { name: "Карась", rarity: "common", chance: 30, minW: 0.2, maxW: 1.5, image: "https://i.ytimg.com/vi/Vy8rRsfMbYY/maxresdefault.jpg" },
        { name: "Окунь", rarity: "common", chance: 25, minW: 0.3, maxW: 2.5, image: "https://i.ytimg.com/vi/N55g_NvEu9c/maxresdefault.jpg" },
        { name: "Сом", rarity: "rare", chance: 10, minW: 5.0, maxW: 50.0, image: "https://avatars.mds.yandex.net/i?id=f25c27a2e5c2428546dbeb9d5642cc59c897acb0-5233251-images-thumbs&n=13" },
        { name: "Золотая рыбка", rarity: "rare", chance: 5, minW: 0.1, maxW: 0.5, image: "https://avatars.mds.yandex.net/i?id=6f716f0df1f0e64f128187c743e49ef3_l-6516498-images-thumbs&n=13" },
        { name: "Кракен", rarity: "legend", chance: 1, minW: 500.0, maxW: 2500.0, image: "https://avatars.mds.yandex.net/i?id=dd13a6e98bdf167c5b86c86dc71fea0da385b381-5888173-images-thumbs&n=13" }
    ];

    let nickname = localStorage.getItem("nick") || "";
    document.getElementById("nickname").value = nickname;

    let stats = JSON.parse(localStorage.getItem("stats")) || { caught: 0, totalWeight: 0 };
    let inventory = JSON.parse(localStorage.getItem("inventory")) || {};

    const trophyImg = document.getElementById("trophy-img");
    const fishBtn = document.getElementById("fishBtn");

    function updateUI() {
        document.getElementById("stat-weight").innerText = stats.totalWeight.toFixed(1);
        document.getElementById("stat-count").innerText = stats.caught;
        
        let invHtml = "<h4>🎒 Мой улов:</h4>";
        for (let name in inventory) {
            let f = fishes.find(x => x.name === name);
            if(f) invHtml += `<div class="inv-item"><img src="${f.image}" class="inv-icon"> <b>${name}</b>: ${inventory[name].count} шт.</div>`;
        }
        document.getElementById("inventory").innerHTML = Object.keys(inventory).length ? invHtml : "";
    }

    function saveNick() {
        nickname = document.getElementById("nickname").value.trim();
        if(!nickname) return alert("Введи ник!");
        localStorage.setItem("nick", nickname);
        savePlayer();
    }

    async function savePlayer() {
        if (!nickname) return;
        await db.from("players").upsert({ nickname: nickname, fish: Number(stats.totalWeight.toFixed(1)) }, { onConflict: 'nickname' });
        loadData();
    }

    async function sendMsg() {
        const input = document.getElementById("chatInput");
        if(!nickname || !input.value.trim()) return;
        await db.from("messages").insert([{ nickname, text: input.value.trim() }]);
        input.value = "";
        loadData();
    }

    async function loadData() {
        try {
            const { data: top } = await db.from("players").select("*").order("fish", { ascending: false }).limit(10);
            if (top) document.getElementById("leaderboard").innerHTML = top.map((p, i) => `<b>${i+1}.</b> ${p.nickname} — ${p.fish} кг`).join("<br>");
            
            const { data: msgs } = await db.from("messages").select("*").order("id", { ascending: false }).limit(10);
            if (msgs) document.getElementById("chat-box").innerHTML = msgs.map(m => `<div><b>${m.nickname}:</b> ${m.text}</div>`).join("");

            const { data: history } = await db.from("catches").select("*").order("id", { ascending: false }).limit(5);
            if (history) {
                document.getElementById("catch-log").innerHTML = history.map(h => {
                    let f = fishes.find(x => x.name === h.fish_name);
                    let imgUrl = f ? f.image : "";
                    return `<div class="log-item"><img src="${imgUrl}" class="log-img"> <span><b>${h.nickname}</b>: ${h.fish_name} (${h.weight.toFixed(1)}кг)</span></div>`;
                }).join("");
            }
        } catch (e) {}
    }

    fishBtn.onclick = async function() {
        if (!nickname) return alert("Введи ник!");
        
        fishBtn.disabled = true;
        trophyImg.style.display = "none";
        document.getElementById("trophy-placeholder").style.display = "block";
        document.getElementById("main-game").classList.add("fishing-active");
        document.getElementById("result").innerText = "Заброс...";

        setTimeout(async () => {
            document.getElementById("main-game").classList.remove("fishing-active");
            if (Math.random() < 0.7) {
                let roll = Math.random() * 71, sum = 0, f = fishes[0];
                for (let x of fishes) { sum += x.chance; if (roll < sum) { f = x; break; } }
                let w = Math.random() * (f.maxW - f.minW) + f.minW;
                
                stats.caught++; 
                stats.totalWeight += w;
                if(!inventory[f.name]) inventory[f.name] = { count: 0 };
                inventory[f.name].count++;

                trophyImg.src = f.image;
                trophyImg.style.display = "block";
                document.getElementById("trophy-placeholder").style.display = "none";
                document.getElementById("result").innerHTML = `Поймал: ${f.name} (${w.toFixed(1)} кг)!`;
                
                await db.from("catches").insert([{ nickname, fish_name: f.name, weight: w }]);
            } else {
                document.getElementById("result").innerText = "Сорвалось...";
            }
            localStorage.setItem("stats", JSON.stringify(stats));
            localStorage.setItem("inventory", JSON.stringify(inventory));
            updateUI(); savePlayer(); startCooldown(10000); 
        }, 2000);
    };

    function startCooldown(ms) {
        let end = Date.now() + ms;
        let t = setInterval(() => {
            let l = end - Date.now();
            if (l <= 0) { clearInterval(t); fishBtn.disabled = false; document.getElementById("timer").innerText = ""; return; }
            document.getElementById("timer").innerText = `Ждем: ${Math.ceil(l/1000)} сек.`;
        }, 1000);
    }

    updateUI(); loadData();
    setInterval(loadData, 5000);
</script>
</body>
</html>
